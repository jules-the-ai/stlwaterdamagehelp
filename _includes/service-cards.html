<div class="cards services-grid">
{% for s in site.data.services %}
  <article class="card service-card">
    {% if s.image_path %}<a class="service-card__media" href="{{ '/services/' | append: s.slug | append: '/' | relative_url }}"><img src="{{ s.image_path | relative_url }}" alt="{{ s.image_alt }}" loading="eager"></a>{% endif %}
    <div class="service-card__body">
      <h3><a href="{{ '/services/' | append: s.slug | append: '/' | relative_url }}">{{ s.title }}</a></h3>
      <p>{{ s.summary }}</p>
      <a class="text-link" href="{{ '/services/' | append: s.slug | append: '/' | relative_url }}">Learn about {{ s.title | downcase }}</a>
    </div>
  </article>
{% endfor %}
</div>
