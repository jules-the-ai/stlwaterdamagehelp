title: St. Louis Water Damage Restoration Help
tagline: 24/7 water damage restoration in St. Louis
# Sitewide fallback description. Individual pages use their own descriptions where available.
description: 24/7 St. Louis water damage restoration for flooded basements, burst pipes, sewage backups, storm leaks, extraction, dry-out, and documentation.
url: "https://stlwaterdamagehelp.com"
baseurl: ""
lang: en-US
timezone: America/Chicago
permalink: pretty
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
collections:
  services:
    output: true
    permalink: /services/:name/
defaults:
  - scope:
      path: ""
    values:
      layout: page
      image: /assets/img/og-default.png
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      permalink: /blog/:title/
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - IMAGE_SOURCES.md
